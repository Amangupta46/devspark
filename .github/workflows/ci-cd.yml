name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  frontend-checks:
    name: Frontend Checks (Lint, Typecheck, Build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lint
        run: pnpm --filter frontend lint

      - name: Run Typecheck
        run: pnpm --filter frontend typecheck

      - name: Build Frontend
        run: pnpm --filter frontend build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  backend-checks:
    name: Backend Checks (Ruff, Black, Mypy, Pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/backend/requirements/local.txt

      - name: Run Ruff
        run: ruff check apps/backend

      - name: Run Black
        run: black --check apps/backend

      - name: Run Mypy
        run: mypy apps/backend

      - name: Run Pytest
        run: |
          cd apps/backend
          pytest
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          DATABASE_URL: sqlite:///:memory:

  docker-build:
    name: Build Docker Images
    needs: [frontend-checks, backend-checks]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: false
          tags: devspark-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: apps/backend/Dockerfile
          push: false
          tags: devspark-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deployment Workflow Placeholder
    needs: [docker-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deployment Step
        run: echo "Deploy to target environment (Vercel/Railway/AWS) would happen here."
