name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: devspark
          POSTGRES_PASSWORD: devsparkpass
          POSTGRES_DB: devsparkdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r apps/backend/requirements/local.txt

    - name: Lint with Ruff
      run: ruff check apps/backend/

    - name: Format with Black
      run: black --check apps/backend/

    - name: Import Sort Check
      run: isort --check-only apps/backend/

    - name: Type Check with Mypy
      run: mypy apps/backend/

    - name: Run Tests
      env:
        DATABASE_URL: postgres://devspark:devsparkpass@localhost:5432/devsparkdb
        CELERY_BROKER_URL: redis://localhost:6379/0
        DJANGO_SETTINGS_MODULE: config.settings.local
        SECRET_KEY: test-key
      run: |
        cd apps/backend
        pytest
