[tool.black]
line-length = 100
target-version = ['py312']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | \.mypy_cache
  | \.pytest_cache
  | build
  | dist
  | migrations
)/
'''

[tool.isort]
profile = "black"
line_length = 100
multi_line_output = 3
skip = [".venv", "migrations"]

[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [
    ".git",
    ".venv",
    ".mypy_cache",
    ".pytest_cache",
    "migrations",
]

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
ignore = [
    "E501",  # line too long, handled by black
]

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --cov=."
testpaths = [
    "features",
    "core",
]
python_files = ["tests.py", "test_*.py", "*_tests.py"]

DJANGO_SETTINGS_MODULE = "config.settings.test"

[tool.mypy]
python_version = "3.12"
strict = false
ignore_missing_imports = true
disable_error_code = ["var-annotated", "attr-defined", "arg-type", "misc", "import-untyped", "valid-type", "return-value"]
exclude = [
    "^.*migrations/.*$",
    "^\\.venv/.*$",
]

plugins = ["mypy_django_plugin.main", "mypy_drf_plugin.main"]

[tool.django-stubs]
django_settings_module = "config.settings.test"
