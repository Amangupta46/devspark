components:
  schemas:
    ClientMessage:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        is_deleted:
          type: boolean
        content:
          type: string
        attachment:
          type: string
          format: uri
          nullable: true
        project:
          type: string
          format: uuid
        sender_client:
          type: string
          format: uuid
          nullable: true
        sender_team:
          type: string
          format: uuid
          nullable: true
        parent_message:
          type: string
          format: uuid
          nullable: true
      required:
      - content
      - created_at
      - id
      - project
      - updated_at
    ClientMessageRequest:
      type: object
      properties:
        is_deleted:
          type: boolean
        content:
          type: string
          minLength: 1
        attachment:
          type: string
          format: binary
          nullable: true
        project:
          type: string
          format: uuid
        sender_client:
          type: string
          format: uuid
          nullable: true
        sender_team:
          type: string
          format: uuid
          nullable: true
        parent_message:
          type: string
          format: uuid
          nullable: true
      required:
      - content
      - project
    ClientUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        is_deleted:
          type: boolean
        role:
          $ref: '#/components/schemas/RoleEnum'
        is_primary_contact:
          type: boolean
        is_billing_contact:
          type: boolean
        is_technical_contact:
          type: boolean
        user:
          type: string
          format: uuid
        company:
          type: string
          format: uuid
        contact:
          type: string
          format: uuid
          nullable: true
      required:
      - company
      - created_at
      - id
      - updated_at
      - user
    ClientUserRequest:
      type: object
      properties:
        is_deleted:
          type: boolean
        role:
          $ref: '#/components/schemas/RoleEnum'
        is_primary_contact:
          type: boolean
        is_billing_contact:
          type: boolean
        is_technical_contact:
          type: boolean
        user:
          type: string
          format: uuid
        company:
          type: string
          format: uuid
        contact:
          type: string
          format: uuid
          nullable: true
      required:
      - company
      - user
    CodeReviewRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
